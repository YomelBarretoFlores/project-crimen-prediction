

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unasam-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unasam-frontend
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
    environment:
      - API_URL=http://api:8000
    command: ["streamlit", "run", "frontend/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
